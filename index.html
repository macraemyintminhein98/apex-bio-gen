<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Apex BioGen</title><style>body{font-family:sans-serif;margin:2em;text-align:center;background:#0d1117;color:#c9d1d9}h1{color:#58a6ff}.container{max-width:600px;margin:2em auto;padding:2em;background:#161b22;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,.5)}.input-group input,.input-group button{padding:10px;margin-top:10px;border-radius:5px;border:none}.input-group input{width:calc(100% - 22px);background:#0d1117;color:#c9d1d9;border:1px solid #30363d}.input-group button{background:#238636;color:white;cursor:pointer}.input-group button:hover{background:#2ea043}.output-box{background:#0d1117;padding:15px;margin-top:20px;border-radius:5px;border:1px solid #30363d;min-height:50px;text-align:left;white-space:pre-wrap}.price-tag{font-size:1.2em;font-weight:bold;margin-top:1.5em;color:#da3633}</style></head><body><div class="container"><h1>Apex BioGen</h1><p>Craft your perfect Instagram bio instantly!</p><div class="input-group"><input type="text" id="keywords" placeholder="Keywords (e.g., foodie, traveler, entrepreneur)"><button onclick="generateBio()">Generate Bio</button></div><div class="output-box" id="bioOutput">Your generated bio will appear here.</div><p class="price-tag">One-time purchase: $9.99</p><p>Unlock unlimited bio generations and advanced options with our Pro version!</p></div><script>function generateBio(){const keywords=document.getElementById('keywords').value;const output=document.getElementById('bioOutput');if(keywords.trim()===''){output.textContent="Please enter some keywords!";}else{output.textContent=`Generating a bio for '${keywords}'... (API integration coming soon!)`;}}</script></body></html>
